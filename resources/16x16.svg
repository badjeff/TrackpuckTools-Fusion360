<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Puck side gradient -->
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8c8c8c"/>
      <stop offset="100%" stop-color="#4f4f4f"/>
    </linearGradient>

    <!-- Puck top glossy gradient -->
    <radialGradient id="topGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#d6d6d6"/>
      <stop offset="60%" stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#5c5c5c"/>
    </radialGradient>

    <!-- Base gradient -->
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e7e2d8"/>
      <stop offset="100%" stop-color="#cfc8bd"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect x="2" y="10" width="12" height="3.5" rx="1.5"
        fill="url(#baseGrad)" stroke="#b9b2a8" stroke-width="0.25"/>

  <!-- Soft hover shadow -->
  <ellipse cx="8" cy="9.5" rx="4" ry="1"
           fill="#000" opacity="0.15"/>

  <!-- Puck bottom ellipse (depth) -->
  <ellipse cx="8" cy="8.5" rx="4.5" ry="1.5"
           fill="#555555"/>

  <!-- Puck side wall -->
  <rect x="3.5" y="5.5" width="9" height="3"
        fill="url(#sideGrad)"/>

  <!-- Puck top ellipse -->
  <ellipse cx="8" cy="5.5" rx="4.5" ry="1.5"
           fill="url(#topGrad)"/>

</svg>
