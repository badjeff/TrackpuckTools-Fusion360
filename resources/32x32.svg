<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Puck side gradient -->
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8c8c8c"/>
      <stop offset="100%" stop-color="#4f4f4f"/>
    </linearGradient>

    <!-- Puck top glossy gradient -->
    <radialGradient id="topGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#d6d6d6"/>
      <stop offset="60%" stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#5c5c5c"/>
    </radialGradient>

    <!-- Base gradient -->
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e7e2d8"/>
      <stop offset="100%" stop-color="#cfc8bd"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect x="4" y="20" width="24" height="7" rx="3"
        fill="url(#baseGrad)" stroke="#b9b2a8" stroke-width="0.5"/>

  <!-- Soft hover shadow -->
  <ellipse cx="16" cy="19" rx="8" ry="2"
           fill="#000" opacity="0.15"/>

  <!-- Puck bottom ellipse (depth) -->
  <ellipse cx="16" cy="17" rx="9" ry="3"
           fill="#555555"/>

  <!-- Puck side wall -->
  <rect x="7" y="11" width="18" height="6"
        fill="url(#sideGrad)"/>

  <!-- Puck top ellipse -->
  <ellipse cx="16" cy="11" rx="9" ry="3"
           fill="url(#topGrad)"/>

</svg>
