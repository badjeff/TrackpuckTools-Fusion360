<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Puck side gradient -->
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8c8c8c"/>
      <stop offset="100%" stop-color="#4f4f4f"/>
    </linearGradient>

    <!-- Puck top glossy gradient -->
    <radialGradient id="topGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#d6d6d6"/>
      <stop offset="60%" stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#5c5c5c"/>
    </radialGradient>

    <!-- Base gradient -->
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e7e2d8"/>
      <stop offset="100%" stop-color="#cfc8bd"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect x="8" y="40" width="48" height="14" rx="6"
        fill="url(#baseGrad)" stroke="#b9b2a8" stroke-width="1"/>

  <!-- Soft hover shadow -->
  <ellipse cx="32" cy="38" rx="16" ry="4"
           fill="#000" opacity="0.15"/>

  <!-- Puck bottom ellipse (depth) -->
  <ellipse cx="32" cy="34" rx="18" ry="6"
           fill="#555555"/>

  <!-- Puck side wall -->
  <rect x="14" y="22" width="36" height="12"
        fill="url(#sideGrad)"/>

  <!-- Puck top ellipse -->
  <ellipse cx="32" cy="22" rx="18" ry="6"
           fill="url(#topGrad)"/>

</svg>
